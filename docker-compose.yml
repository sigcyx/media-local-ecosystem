services:
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ${SOURCE_MEDIA_PATH}:/media/source:ro
      - ${DERIVED_MEDIA_PATH}:/media/derived
    depends_on:
      - postgres
      - redis

  worker:
    build: ./worker
    env_file: .env
    volumes:
      - ${SOURCE_MEDIA_PATH}:/media/source:ro
      - ${DERIVED_MEDIA_PATH}:/media/derived
    depends_on:
      - redis
      - postgres
      - ai-service

  ai-service:
    build: ./ai-service
    env_file: .env

volumes:
  pgdata:
